name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Format check
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "Unformatted files detected:"
            echo "$unformatted"
            exit 1
          fi

      - name: Unit and integration tests
        run: go test -count=1 ./...

      - name: Race detector
        run: go test -race -count=1 ./...

      - name: Vet (lint)
        run: go vet ./...

      - name: Docker build
        run: docker build -t tg-discord-bot:ci .
